name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 25
      uses: actions/setup-node@v4
      with:
        node-version: 25
        # This tells GitHub exactly where your lock file is for caching
        cache: 'npm'
        cache-dependency-path: 'my-app/package-lock.json'

    - name: Install and Build
      # We use 'cd my-app' because that is where your package.json is
      run: |
        cd my-app
        npm install
        npm run build
