name: CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This environment variable clears the Node.js warning you received
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Updated to 24 to match the warning recommendation
          node-version: '24' 
          cache: 'npm'
          # We use a 'glob' pattern to find the lock file anywhere in the repo
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        # If this step still fails, it means your code has no tests yet.
        # In that case, you can temporarily change this line to: run: npm run build
        run: npm test
