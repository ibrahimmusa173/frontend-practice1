name: Node.js CI

# CHANGE 1: Add this environment variable at the top to stop the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        # CHANGE 2: Update the version here to 24
        node-version: '24' 
        cache: 'npm'
        # CHANGE 3: Fix the path error by pointing to your subfolder
        cache-dependency-path: './frontend practice/package-lock.json'

    - name: Install Dependencies
      # Make sure the command runs inside your subfolder
      run: npm install
      working-directory: './frontend practice'

    - name: Run Build
      run: npm run build --if-present
      working-directory: './frontend practice'
