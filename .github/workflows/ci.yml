name: CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # This fixes the yellow "Node.js 20" warning in your screenshot
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        # This fixes the "ENOENT" error by telling GitHub your code is in 'my-app'
        working-directory: my-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # We use package.json here because the runner is having trouble finding your lockfile
          cache-dependency-path: my-app/package.json

      - name: Install dependencies
        run: npm install

      - name: Verify Build
        # CRITICAL: Your package.json DOES NOT have a "test" script. 
        # Running "npm test" will always fail. Use "npm run build" instead.
        run: npm run build
