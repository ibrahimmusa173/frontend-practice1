name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 25
      uses: actions/setup-node@v4
      with:
        node-version: 25
        # This points to the package-lock inside your my-app folder
        cache-dependency-path: 'my-app/package-lock.json'

    - name: Install and Build
      # This runs the commands specifically inside the my-app folder
      run: |
        cd my-app
        npm install
        npm run build
