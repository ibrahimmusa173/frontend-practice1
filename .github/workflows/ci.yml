name: CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This tells GitHub to look inside the 'my-app' folder for all steps
    defaults:
      run:
        working-directory: my-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        # Note: If you don't have tests yet, you can change this to 'npm run build' 
        # to at least check if the project compiles.
        run: npm test
